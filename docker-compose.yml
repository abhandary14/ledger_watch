services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ledgerwatch}
      POSTGRES_USER: ${DB_USER:-ledger}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ledger}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-ledger} -d ${DB_NAME:-ledgerwatch}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ledgerwatch:latest
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ./config/.env
    environment:
      DB_HOST: postgres
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
